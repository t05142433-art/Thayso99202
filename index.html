<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pareamento - Thayson & Thayla IPTV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .neon-border { border: 2px solid #ff00ff; box-shadow: 0 0 10px #ff00ff, inset 0 0 5px #ff00ff; }
        .neon-text { text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-zinc-900 p-8 rounded-2xl neon-border">
        <h1 class="text-3xl font-bold mb-6 text-center neon-text">Conectar TV</h1>
        <p class="text-zinc-400 mb-8 text-center">Digite o código de 6 dígitos exibido na sua Roku TV.</p>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Código de Pareamento</label>
                <input id="code" type="text" maxlength="6" placeholder="000000" 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-center text-2xl tracking-widest focus:outline-none focus:border-cyan-400">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">URL da Playlist (M3U)</label>
                <input id="playlist" type="text" placeholder="http://..." 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-pink-500">
            </div>
            
            <button id="btnConnect" class="w-full bg-gradient-to-r from-cyan-500 to-pink-500 py-4 rounded-xl font-bold text-lg hover:opacity-90 transition-opacity">
                CONECTAR AGORA
            </button>
            
            <p id="message" class="text-center text-sm mt-4"></p>
        </div>
    </div>

    <script>
        document.getElementById('btnConnect').addEventListener('click', async () => {
            const code = document.getElementById('code').value;
            const playlistUrl = document.getElementById('playlist').value;
            const msg = document.getElementById('message');

            if (!code || !playlistUrl) {
                msg.innerText = 'Preencha todos os campos';
                msg.className = 'text-center text-red-500 mt-4';
                return;
            }

            try {
                const response = await fetch('/api/pair/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, playlistUrl })
                });
                const data = await response.json();
                
                if (data.success) {
                    msg.innerText = 'Conectado com sucesso! Verifique sua TV.';
                    msg.className = 'text-center text-green-500 mt-4';
                } else {
                    msg.innerText = data.message;
                    msg.className = 'text-center text-red-500 mt-4';
                }
            } catch (e) {
                msg.innerText = 'Erro ao conectar';
                msg.className = 'text-center text-red-500 mt-4';
            }
        });
    </script>
</body>
</html>
